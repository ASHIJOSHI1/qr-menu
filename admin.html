<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Menu Admin</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
}

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.admin-layout{
display:grid;
grid-template-columns:250px 1fr;
gap:20px;
}

@media(max-width:700px){
.admin-layout{
grid-template-columns:1fr;
}
}

/* CATEGORY PANEL */

.category-panel{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.category{
padding:10px;
border-radius:6px;
margin-bottom:8px;
background:#eee;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.category.active{
background:#222;
color:white;
}

/* ITEMS PANEL */

.items-panel{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);

    overflow-y: auto;
    max-height: 100vh;
}

.item-row{
display:flex;
justify-content:space-between;
align-items:flex-start;
padding:12px 0;
border-bottom:1px solid #eee;
gap:10px;
}

.item-info{
display:flex;
flex-direction:column;
}

.item-actions{
display:flex;
gap:6px;
align-items:center;
flex-wrap:nowrap;
}

.action-btn {
    font-size: 16px;
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    transition: 0.2s;
}

.action-btn svg {
    width: 21px !important;
    height: 21px !important;
}

/* Camera button icon */
button svg {
    stroke: white;
    width: 20px;
    height: 20px;
}

button:hover {
    background: #444;
}

.action-btn:hover {
    background: #eee;
}

.action-btn.delete:hover {
    background: #ffebeb;
}

.add-btn{
margin-top:15px;
padding:10px;
border:none;
background:#222;
color:white;
border-radius:6px;
cursor:pointer;
}

/* FORM */

.form-box{
margin-top:20px;
padding:18px;
background:#fafafa;
border-radius:10px;
max-width:420px;
margin-left:auto;
margin-right:auto;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.image-row {
    margin-top: 12px;
    margin-bottom: 15px;
}

.form-box input,
.form-box textarea,
.form-box select{
width:100%;
padding:11px;
margin-bottom:14px;
border:1px solid #ddd;
border-radius:7px;
font-size:14px;
box-sizing:border-box;
}

.form-actions{
display:flex;
gap:10px;
}

.form-actions button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.save-btn{
background:#ff6b6b;
color:white;
}

.cancel-btn{
background:#ddd;
}

/* SEARCH */

.search-box{
width:100%;
padding:10px;
margin-bottom:25px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);

justify-content:flex-start;
align-items:center;

padding:20px;
box-sizing:border-box;
overflow:auto;

z-index:1000;

display:none;
}

.modal-box{
background:white;
padding:24px;
border-radius:14px;
width:100%;
max-width:420px;
box-sizing:border-box;
box-shadow:0 10px 35px rgba(0,0,0,0.15);

margin-top: 60px;
}

.crop-wrapper {
    width: 100%;
    max-height: 300px;
    overflow: hidden;
}

#cropImage {
    width: 100%;
    display: block;
}

#cropModal .modal-box {
    max-width: 400px;
}

#cropImage {
    background: #000;
    border-radius: 8px;
}

.modal-box input,
.modal-box textarea,
.modal-box select{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

.modal-actions{
margin-top:18px;
display:flex;
gap:10px;
}

.modal-actions button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.modal-actions button:first-child{
background:#ddd;
}

.modal-actions button:last-child{
background:#ff6b6b;
color:white;
}

/* TOAST */

#toast{
position:fixed;
top:20px;
right:20px;
background:#2ecc71;
color:white;
padding:12px 18px;
border-radius:6px;
display:none;
}

.drag-handle {
    cursor: grab;
    font-size: 23px;
    margin-left: 10px;
    line-height: 1;

    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
}
.drag-ghost {
    opacity: 0.3;
}

.drag-chosen {
    transform: scale(1.04);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    background: white;
}

.drag-dragging {
    transform: rotate(1deg);
}
.drag-handle:active {
    cursor: grabbing;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>


</head>

<body>

<div class="container">

<h1>Glorious Restaurant</h1>
<p style="text-align:center;margin-top:-10px;font-weight:600;">Menu Manager</p>
<p style="text-align:center;color:#777;margin-top:-6px;">Manage your menu</p>

<div class="admin-layout">

<div class="category-panel">
<h3>Categories</h3>

<div id="categoryList"></div>

<div style="display:flex;gap:10px;margin-top:10px;">
<button class="add-btn" onclick="openCategoryModal()" style="flex:1;">+ New Category</button>
<button class="add-btn" onclick="window.open('menu.html')" style="flex:1;background:#ff6b6b;">Preview</button>
</div>

</div>

<div class="items-panel">

<input id="searchBox" class="search-box" placeholder="Search items..." onkeyup="searchItems()">

<h3 id="categoryTitle">Select Category</h3>

<div id="categoryControls" style="margin-bottom:10px;"></div>

<hr style="border:none;border-top:1px solid #eee;margin:10px 0 15px 0;">

<div id="itemsList"></div>

<button class="add-btn" onclick="showAddForm()">+ Add Item</button>

<div id="formArea"></div>

</div>

</div>
</div>

<!-- MODALS -->

<div id="inputModal" class="modal">
<div class="modal-box">
<h3 id="modalTitle"></h3>

<input id="modalInput1" placeholder="Name">
<input id="modalInput2" placeholder="Price">
<textarea id="modalInput3" placeholder="Description"></textarea>

<select id="modalRelated" style="margin-top:12px;display:none;"></select>

<input id="modalImage" type="file" accept="image/*" style="margin-top:12px;display:none;">

<div class="image-row" style="display:flex;gap:8px;align-items:center;">

    <!-- Hidden input (gallery) -->
    <input id="editDishImage" type="file" accept="image/*" style="display:none;">

    <!-- Hidden input (camera) -->
    <input id="editDishCamera" type="file" accept="image/*" capture="environment" style="display:none;">

    <!-- Fake button -->
    <div onclick="document.getElementById('editDishImage').click()" 
         style="flex:1;padding:11px;border:1px solid #ddd;border-radius:7px;cursor:pointer;">
        Choose Image
    </div>

    <!-- Camera button -->
    <button type="button"
    onclick="document.getElementById('editDishCamera').click()"
    style="
        width:42px;
        height:42px;
        display:flex;
        align-items:center;
        justify-content:center;
        border:none;
        background:#222;
        border-radius:8px;
        cursor:pointer;
    ">
    <i data-lucide="camera"></i>
</button>

</div>

<img id="editPreviewImage" style="
    width:100%;
    max-height:200px;
    object-fit:cover;
    border-radius:8px;
    display:none;
    margin-top:10px;
">

<div class="modal-actions">
<button onclick="closeInputModal()">Cancel</button>
<button onclick="saveModal()">Save</button>
</div>

</div>
</div>

<div id="confirmModal" class="modal">
<div class="modal-box">
<h3 id="confirmText"></h3>
<div class="modal-actions">
<button onclick="closeConfirm()">Cancel</button>
<button id="confirmBtn">Delete</button>
</div>
</div>
</div>

<div id="toast"></div>

<div id="cropModal" class="modal">
<div class="modal-box">
<h3>Crop Image</h3>

<div class="crop-wrapper">
    <img id="cropImage">
</div>

<div class="modal-actions">
<button onclick="closeCrop()">Cancel</button>
<button onclick="applyCrop()">Apply</button>
</div>

</div>
</div>

<script>

let menuData = JSON.parse(localStorage.getItem("menuData")) || {};
let currentCategory=null;
let confirmAction=null;
let editIndex=null;

/* SAVE */

function saveData(){
localStorage.setItem("menuData",JSON.stringify(menuData));
}

/* TOAST */

function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* CATEGORY RENDER */

function renderCategories(){

let list=document.getElementById("categoryList");
list.innerHTML="";

Object.keys(menuData).forEach(cat=>{

let count=menuData[cat].items.length;
let label=cat;

if(menuData[cat].hidden) label+=" (Hidden)";
label+=" ("+count+")";

let div=document.createElement("div");
div.className="category";
div.setAttribute("data-name", cat);

if(cat===currentCategory) div.classList.add("active");

div.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
    <span>${label}</span>
    <span class="drag-handle">≡</span>
</div>
`;

div.onclick=()=>{
currentCategory=cat;
renderCategories();
renderItems();
};

list.appendChild(div);

});

new Sortable(list, {
    animation: 150,
    handle: ".drag-handle",

    delay: 800,
    delayOnTouchOnly: true,

    ghostClass: "drag-ghost",
    chosenClass: "drag-chosen",
    dragClass: "drag-dragging",

    onEnd: function () {

        let newOrder = [];
        let items = document.querySelectorAll("#categoryList .category");

        items.forEach(el => {
            let name = el.getAttribute("data-name");
            newOrder.push(name);
        });

        let newData = {};

        newOrder.forEach(cat => {
            newData[cat] = menuData[cat];
        });

        menuData = newData;

        saveData();
    }
});

}

/* CATEGORY MODAL */

function openCategoryModal(){

editIndex = null;

document.getElementById("modalTitle").innerText = "Add Category";

document.getElementById("modalInput1").value = "";
document.getElementById("modalInput2").style.display = "none";
document.getElementById("modalInput3").style.display = "none";

document.getElementById("modalRelated").style.display = "none";
document.querySelector(".image-row").style.display = "none";
document.getElementById("editPreviewImage").style.display = "none";
croppedBlob = null;

document.getElementById("inputModal").style.display = "flex";
}

function editCategory(){

document.getElementById("modalTitle").innerText="Edit Category";

document.getElementById("modalInput1").value=currentCategory;

document.getElementById("modalInput2").style.display="none";
document.getElementById("modalInput3").style.display="none";

document.getElementById("modalRelated").style.display="none";
document.getElementById("modalImage").style.display="none";

Pdocument.querySelector(".image-row").style.display = "none";
document.getElementById("editPreviewImage").style.display = "none";

editIndex="category";

document.getElementById("inputModal").style.display="flex";

}

function closeInputModal(){
document.getElementById("inputModal").style.display="none";
}

/* SAVE MODAL */

function saveModal(){

let name=document.getElementById("modalInput1").value.trim();

if(typeof editIndex === "number"){

let item = menuData[currentCategory].items[editIndex];

item.name = document.getElementById("modalInput1").value;
item.price = document.getElementById("modalInput2").value;
item.description = document.getElementById("modalInput3").value;

let related=document.getElementById("modalRelated");
if(related) item.related=related.value;

// ✅ IMAGE FIX START

let input = document.getElementById("editDishImage");
let file = croppedBlob ? croppedBlob : (input.files && input.files[0]);

if(file){

    compressImage(file, function(compressedFile){

        let reader = new FileReader();

        reader.onload = function(e){

            item.image = e.target.result; // ✅ update image

            saveData();
            renderItems();
            closeInputModal();
            showToast("Item updated");

        };

        reader.readAsDataURL(compressedFile);

    });

    editIndex = null;
    return;
}

// if no new image selected → keep old image

saveData();
renderItems();
closeInputModal();
showToast("Item updated");

editIndex = null;

return;
}

if(editIndex==="category"){

menuData[name]=menuData[currentCategory];
delete menuData[currentCategory];
currentCategory=name;

saveData();
renderCategories();
renderItems();
closeInputModal();

showToast("Category updated");

return;

}

if(!name){
showToast("Enter category name");
return;
}

if(menuData[name]){
showToast("Category exists");
return;
}

menuData[name]={hidden:false,items:[]};

saveData();
renderCategories();

closeInputModal();

showToast("Category added");

}

/* ADD FORM */

function showAddForm(){

if(!currentCategory){
showToast("Select category first");
return;
}

let area=document.getElementById("formArea");

let options="";
Object.keys(menuData).forEach(c=>{
options+=`<option value="${c}">${c}</option>`;
});

area.innerHTML=`
<div class="form-box">

<input id="dishName" placeholder="Dish name">
<input id="dishPrice" type="number" step="0.01" placeholder="Price">
<textarea id="dishDesc" placeholder="Description"></textarea>

<select id="dishRelated">
<option value="">Related category</option>
${options}
</select>

<div class="image-row" style="display:flex;gap:8px;align-items:center;">

    <!-- Hidden input (gallery) -->
    <input id="dishImage" type="file" accept="image/*" style="display:none;">

    <!-- Hidden input (camera) -->
    <input id="dishCamera" type="file" accept="image/*" capture="environment" style="display:none;">

    <!-- Fake input UI -->
    <div onclick="document.getElementById('dishImage').click()" 
         style="flex:1;padding:11px;border:1px solid #ddd;border-radius:7px;cursor:pointer;">
        Choose Image
    </div>

    <!-- Camera button -->
    <button type="button"
        onclick="document.getElementById('dishCamera').click()"
        style="padding:11px 14px;border:none;background:#222;color:white;border-radius:7px;cursor:pointer;">
        <i data-lucide="camera"></i>
    </button>

</div>

<img id="previewImage" style="
    width:100%;
    max-height:200px;
    object-fit:cover;
    border-radius:8px;
    display:none;
    margin-bottom:10px;
">

<div class="form-actions">
<button class="cancel-btn" onclick="closeForm()">Cancel</button>
<button class="save-btn" onclick="addItem()">Save</button>
</div>

</div>
`;

lucide.createIcons();

// ✅ ADD THIS BELOW
setTimeout(() => {
    document.getElementById("formArea").scrollIntoView({
        behavior: "smooth",
        block: "start"
    });
}, 100);
}

function closeForm(){
document.getElementById("formArea").innerHTML="";
}

function compressImage(file, callback){

let reader = new FileReader();

reader.onload = function(e){

let img = new Image();

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let maxWidth = 600;

let scale = maxWidth / img.width;

canvas.width = maxWidth;
canvas.height = img.height * scale;

ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

canvas.toBlob(function(blob){

if(blob){
callback(blob);
}else{
showToast("Image compression failed");
}

}, "image/jpeg", 0.7); // quality 70%

};

img.src = e.target.result;

};

reader.readAsDataURL(file);
}

/* ADD ITEM */

function addItem(){

let name=document.getElementById("dishName").value.trim();
let price=document.getElementById("dishPrice").value;
let desc=document.getElementById("dishDesc").value;
let related=document.getElementById("dishRelated").value;

let input = document.getElementById("dishImage");
let file = croppedBlob ? croppedBlob : (input.files && input.files[0]);

// 🚫 FILE SIZE LIMIT (4MB)
if(file && file.size > 4 * 1024 * 1024){
    showToast("Image too large (max 4MB)");
    return;
}

// validation FIRST
if(!name || !price){
showToast("Fill required");
return;
}

// if image → compress
if(file){

compressImage(file, function(compressedFile){

saveItem(name, price, desc, related, compressedFile);

});

return;

}

// no image → normal save
saveItem(name, price, desc, related, null);

}

function saveItem(name, price, desc, related, file){

price = parseFloat(price).toFixed(2);

if(file){

let reader = new FileReader();

reader.onload = function(e){

menuData[currentCategory].items.push({
name,
price,
description: desc,
related,
image: e.target.result,   // ✅ BASE64 STORED HERE
hidden: false
});

saveData();
renderItems();
renderCategories();
closeForm();

showToast("Item added");

};

reader.readAsDataURL(file);

}else{

menuData[currentCategory].items.push({
name,
price,
description: desc,
related,
image: null,   // no image
hidden: false
});

saveData();
renderItems();
renderCategories();
closeForm();

showToast("Item added");

}
}


/* ITEMS RENDER */

function renderItems(){

let list=document.getElementById("itemsList");
let title=document.getElementById("categoryTitle");
let controls=document.getElementById("categoryControls");

if(!currentCategory){
title.innerText="Select Category";
list.innerHTML="";
controls.innerHTML="";
return;
}

title.innerText=currentCategory;

controls.innerHTML=`
<button onclick="editCategory()">Edit</button>
<button onclick="toggleCategory()">${menuData[currentCategory].hidden ? "Unhide" : "Hide"}</button>
<button onclick="deleteCategory()">Delete</button>
`;

list.innerHTML="";

menuData[currentCategory].items.forEach((item,i)=>{

let name=item.name;
if(item.hidden) name+=" (Hidden)";

let row=document.createElement("div");

row.className="item-row";
row.setAttribute("data-index", i);

row.innerHTML = `
<div style="display:flex;justify-content:space-between;align-items:center;width:100%;">

    <div class="item-info">
        <strong>${name}</strong>
        <span>₹${item.price}</span>
    </div>

    <div class="item-actions">

        <span onclick="editItem(${i})" class="action-btn" title="Edit">
            <i data-lucide="edit"></i>
        </span>

        <span onclick="toggleItem(${i})" class="action-btn" title="Toggle">
            <i data-lucide="${item.hidden ? 'eye-off' : 'eye'}"></i>
        </span>

        <span onclick="deleteItem(${i})" class="action-btn delete" title="Delete">
            <i data-lucide="trash-2"></i>
        </span>

        <span class="drag-handle">≡</span>

    </div>

</div>
`;

list.appendChild(row);

});

lucide.createIcons();

// 👇 SORTABLE HERE

if(window.itemsSortable){
    window.itemsSortable.destroy();
}

window.itemsSortable = new Sortable(document.getElementById("itemsList"), {
    animation: 150,
    handle: ".drag-handle",

    delay: 800,
    delayOnTouchOnly: true,

    ghostClass: "drag-ghost",
    chosenClass: "drag-chosen",
    dragClass: "drag-dragging",

    onEnd: function () {

        let newOrder = [];
        let items = document.querySelectorAll("#itemsList .item-row");

        items.forEach(el => {
            let index = el.getAttribute("data-index");
            newOrder.push(menuData[currentCategory].items[index]);
        });

        menuData[currentCategory].items = newOrder;

        saveData();
        renderItems(); // ✅ keep this for items
    }
});

} // ← function ends here



/* EDIT ITEM */

function editItem(i){

let item=menuData[currentCategory].items[i];

document.getElementById("modalTitle").innerText="Edit Item";

document.getElementById("modalInput1").value=item.name;
document.getElementById("modalInput2").value=item.price;
document.getElementById("modalInput3").value=item.description||"";

document.getElementById("modalInput2").style.display="block";
document.getElementById("modalInput3").style.display="block";
document.getElementById("modalRelated").style.display="block";
document.getElementById("modalImage").style.display="none";

let select=document.getElementById("modalRelated");

let options="<option value=''>Related category</option>";

Object.keys(menuData).forEach(c=>{
options+=`<option value="${c}" ${item.related===c?"selected":""}>${c}</option>`;
});

select.innerHTML = options;

let preview = document.getElementById("editPreviewImage");

if(item.image){
    preview.src = item.image;
    preview.style.display = "block";
} else {
    preview.style.display = "none";
}

editIndex = i;
croppedBlob = null;

document.getElementById("inputModal").style.display = "flex";

requestAnimationFrame(() => {
    lucide.createIcons();
});

}

/* MOVE */

function moveItem(i,dir){

let items=menuData[currentCategory].items;

let newIndex=i+dir;

if(newIndex<0||newIndex>=items.length) return;

[items[i],items[newIndex]]=[items[newIndex],items[i]];

saveData();
renderItems();

}

function moveCategory(cat,dir){

let keys=Object.keys(menuData);
let index=keys.indexOf(cat);

let newIndex=index+dir;

if(newIndex<0||newIndex>=keys.length) return;

let temp=keys[index];
keys[index]=keys[newIndex];
keys[newIndex]=temp;

let newData={};

keys.forEach(k=>{
newData[k]=menuData[k];
});

menuData=newData;

saveData();
renderCategories();

}

/* TOGGLE */

function toggleItem(i){
menuData[currentCategory].items[i].hidden=!menuData[currentCategory].items[i].hidden;
saveData();
renderItems();
}

/* CATEGORY TOGGLE */

function toggleCategory(){
menuData[currentCategory].hidden=!menuData[currentCategory].hidden;
saveData();
renderCategories();
renderItems();
}

/* DELETE */

function deleteItem(i){

showConfirm("Delete item?",()=>{

menuData[currentCategory].items.splice(i,1);

saveData();
renderItems();
renderCategories();

showToast("Item deleted");

});

}

function deleteCategory(){

showConfirm("Delete category?",()=>{

delete menuData[currentCategory];
currentCategory=null;

saveData();
renderCategories();
renderItems();

showToast("Category deleted");

});

}

/* CONFIRM */

function showConfirm(msg,action){

confirmAction=action;

document.getElementById("confirmText").innerText=msg;
document.getElementById("confirmModal").style.display="flex";

}

function closeConfirm(){
document.getElementById("confirmModal").style.display="none";
}

document.getElementById("confirmBtn").onclick=function(){

if(confirmAction) confirmAction();

closeConfirm();

};

/* SEARCH */

function searchItems(){

let term=document.getElementById("searchBox").value.toLowerCase();

if(term===""){
renderItems();
return;
}

let list=document.getElementById("itemsList");

list.innerHTML="";

Object.keys(menuData).forEach(cat=>{

let cropper;
let croppedBlob = null;

document.addEventListener("change", function(e){

    if(e.target && (
    e.target.id === "dishImage" ||
    e.target.id === "dishCamera" ||
    e.target.id === "editDishImage" ||
    e.target.id === "editDishCamera"
)){

        let file = e.target.files[0];
        if(!file) return;

        // 🚫 size limit (keep here)
        if(file.size > 4 * 1024 * 1024){
            showToast("Max image size is 4MB");
            return;
        }

        let reader = new FileReader();

        reader.onload = function(ev){

            let cropImg = document.getElementById("cropImage");
            cropImg.src = ev.target.result;

            document.getElementById("cropModal").style.display = "flex";

            if(cropper) cropper.destroy();

            cropper = new Cropper(cropImg, {
                aspectRatio: NaN,
                viewMode: 1
            });

        };

        reader.readAsDataURL(file);
    }

});

function applyCrop(){

    if(!cropper) return;

    let canvas = cropper.getCroppedCanvas({
        width: 600,
        height: 600
    });

    canvas.toBlob(function(blob){

        if(!blob){
            showToast("Crop failed");
            return;
        }

        croppedBlob = blob;

        let reader = new FileReader();
        reader.onload = function(e){
            let img = document.getElementById("previewImage") || document.getElementById("editPreviewImage");
            if(img){
                img.src = e.target.result;
                img.style.display = "block";
            }
        };
        reader.readAsDataURL(blob);

        closeCrop();

    }, "image/jpeg", 0.8);
}

function closeCrop(){
    document.getElementById("cropModal").style.display = "none";

    if(cropper){
        cropper.destroy();
        cropper = null;
    }
}

lucide.createIcons();

document.addEventListener("focusin", function(e) {

    const ids = [
        "dishName",
        "dishPrice",
        "dishDesc",
        "modalInput1",
        "modalInput2",
        "modalInput3"
    ];

    if (!ids.includes(e.target.id)) return;

    // Wait for keyboard
    setTimeout(() => {

        const y = e.target.getBoundingClientRect().top + window.scrollY;

        window.scrollTo({
            top: y - 150,
            behavior: "smooth"
        });

    }, 350);

});

</script>
